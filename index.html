<!doctype html>
<html lang="fr" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>fredericmirindi</title>
    <meta
      name="description"
      content="Page d'accueil animee de fredericmirindi avec particules interactives."
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      window.tailwind = window.tailwind || {};
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: {
              display: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"]
            },
            keyframes: {
              "fade-in": {
                "0%": { opacity: "0" },
                "70%": { opacity: "0" },
                "100%": { opacity: "1" }
              },
              "fade-left": {
                "0%": { transform: "translateX(100%)", opacity: "0" },
                "30%": { transform: "translateX(0)", opacity: "1" },
                "100%": { opacity: "0" }
              },
              "fade-right": {
                "0%": { transform: "translateX(-100%)", opacity: "0" },
                "30%": { transform: "translateX(0)", opacity: "1" },
                "100%": { opacity: "0" }
              },
              title: {
                "0%": {
                  opacity: "0",
                  lineHeight: "0%",
                  letterSpacing: "0.24em",
                  WebkitTextStroke: "1px rgba(255,255,255,0.35)"
                },
                "25%": {
                  opacity: "0",
                  lineHeight: "0%",
                  WebkitTextStroke: "1px rgba(255,255,255,0.22)"
                },
                "80%": {
                  opacity: "0.82",
                  WebkitTextStroke: "1px rgba(255,255,255,0.10)"
                },
                "100%": {
                  opacity: "1",
                  lineHeight: "1.5",
                  letterSpacing: "0",
                  WebkitTextStroke: "1px rgba(255,255,255,0)"
                }
              },
              glow: {
                "0%, 100%": { filter: "brightness(1)" },
                "50%": { filter: "brightness(1.55)" }
              }
            },
            animation: {
              "fade-in": "fade-in 3s ease-in-out forwards",
              "fade-left": "fade-left 3s ease-in-out forwards",
              "fade-right": "fade-right 3s ease-in-out forwards",
              title: "title 3s ease-out forwards",
              glow: "glow 3s ease-in-out infinite"
            }
          }
        }
      };
    </script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="bg-black text-zinc-100">
    <main
      class="home-shell relative flex h-screen w-screen flex-col items-center justify-center overflow-hidden bg-gradient-to-tl from-black via-zinc-700/20 to-black"
    >
      <canvas id="particles" aria-hidden="true"></canvas>

      <nav class="home-nav z-10 my-16 animate-fade-in">
        <ul class="flex items-center justify-center gap-5 text-sm md:text-base">
          <li>
            <a class="text-zinc-500 duration-500 hover:text-zinc-300" href="#">
              Projets
            </a>
          </li>
          <li>
            <a class="text-zinc-500 duration-500 hover:text-zinc-300" href="#">
              A propos
            </a>
          </li>
          <li>
            <a class="text-zinc-500 duration-500 hover:text-zinc-300" href="#">
              Contact
            </a>
          </li>
        </ul>
      </nav>

      <div
        class="light-line z-10 hidden h-px w-screen animate-fade-left bg-gradient-to-r from-zinc-300/0 via-zinc-300/50 to-zinc-300/0 md:block"
      ></div>

      <h1
        class="home-title z-10 animate-title cursor-default whitespace-nowrap bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-zinc-100 via-zinc-400 to-zinc-700 bg-clip-text px-4 text-center font-display text-5xl font-black text-transparent sm:text-7xl md:text-[132px]"
      >
        fredericmirindi
      </h1>

      <div
        class="light-line z-10 hidden h-px w-screen animate-fade-right bg-gradient-to-r from-zinc-300/0 via-zinc-300/50 to-zinc-300/0 md:block"
      ></div>

      <section class="home-intro z-10 mx-6 my-16 max-w-2xl animate-fade-in text-center">
        <p class="text-sm leading-7 text-zinc-500 md:text-base">
          Bienvenue. Une presence digitale simple, sombre et elegante, avec une
          introduction animee et un fond de particules interactives.
        </p>
      </section>
    </main>

    <script src="./particles.js"></script>
  </body>
</html>
