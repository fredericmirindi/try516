<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Frederic Mirindi</title>
    <meta
      name="description"
      content="Frederic Mirindi's personal website, currently under construction."
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      window.tailwind = window.tailwind || {};
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: {
              display: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"]
            },
            keyframes: {
              "fade-in": {
                "0%": { opacity: "0" },
                "70%": { opacity: "0" },
                "100%": { opacity: "1" }
              },
              "fade-left": {
                "0%": { transform: "translateX(100%)", opacity: "0" },
                "30%": { transform: "translateX(0)", opacity: "1" },
                "100%": { opacity: "0" }
              },
              "fade-right": {
                "0%": { transform: "translateX(-100%)", opacity: "0" },
                "30%": { transform: "translateX(0)", opacity: "1" },
                "100%": { opacity: "0" }
              },
              title: {
                "0%": {
                  opacity: "0",
                  lineHeight: "0%",
                  letterSpacing: "0.25em",
                  WebkitTextStroke: "1px rgba(255,255,255,0.3)"
                },
                "25%": {
                  opacity: "0",
                  lineHeight: "0%",
                  WebkitTextStroke: "1px rgba(255,255,255,0.2)"
                },
                "80%": {
                  opacity: "0.8",
                  WebkitTextStroke: "1px rgba(255,255,255,0.1)"
                },
                "100%": {
                  opacity: "1",
                  lineHeight: "1.5",
                  letterSpacing: "0",
                  WebkitTextStroke: "1px rgba(255,255,255,0)"
                }
              }
            },
            animation: {
              "fade-in": "fade-in 3s ease-in-out forwards",
              "fade-left": "fade-left 3s ease-in-out forwards",
              "fade-right": "fade-right 3s ease-in-out forwards",
              title: "title 3s ease-out forwards"
            }
          }
        }
      };
    </script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="home-page bg-black text-zinc-100">
    <main class="home-shell">
      <canvas id="particles" aria-hidden="true"></canvas>

      <nav class="home-nav" aria-label="Primary navigation">
        <ul>
          <li><a href="./projects.html">Projects</a></li>
          <li><a href="#">About</a></li>
          <li><a href="#">Contact</a></li>
          <li><a href="#">Articles</a></li>
        </ul>
      </nav>

      <div class="light-line animate-fade-left"></div>

      <div class="title-curtain" aria-label="Frederic Mirindi">
        <h1 class="home-title">Frederic Mirindi</h1>
      </div>

      <div class="light-line animate-fade-right"></div>

      <section class="home-intro">
        <p>
          This website is currently under construction and will be updated
          regularly. I am a PhD candidate, PhD(c), at the University of
          Manitoba.
        </p>
      </section>
    </main>

    <script src="./particles.js"></script>
  </body>
</html>
